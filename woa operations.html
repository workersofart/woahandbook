document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

st';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"aefba19d-e22c-4953-808c-7d9cc41d5fea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   WOA — Color tokens\n   A warm, paper-and-ink editorial palette. Burnt-terracotta is the\n   single brand accent; a deep teal is the secondary. Everything sits\n   on warm cream paper, never pure white, never pure black.\n   Base ramp + semantic aliases. Dark mode mirrors automatically.\n   ============================================================ */\n\n:root {\n  /* ---- Base ramp (warm neutrals) ---- */\n  --ink:    #1a1815;   /* near-black, warm — primary text & filled buttons */\n  --paper:  #f4f1ea;   /* warm cream — app background */\n  --card:   #fffdf8;   /* off-white — raised surfaces */\n  --line:   #ddd6c8;   /* warm border / hairline */\n  --muted:  #7a7468;   /* warm gray — secondary text, labels */\n\n  /* ---- Brand ---- */\n  --accent:  #b5491f;  /* burnt terracotta — PRIMARY brand accent */\n  --accent2: #1d6b58;  /* deep teal-green — secondary accent */\n  --gold:    #a8842c;  /* ochre / brass — tertiary */\n\n  /* ---- Status / data hues (muted, earthy — never neon) ---- */\n  --blue:  #2a5a8c;\n  --red:   #a32d2d;\n  --amber: #9a6a0c;\n  --green: #3b6d11;\n\n  /* ---- Translucent washes (tints over paper) ---- */\n  --wash-neutral: rgba(120,110,90,.08);   /* hover fill on ghost controls */\n  --wash-neutral-2: rgba(120,110,90,.045);/* table row hover */\n  --tint-accent:  rgba(181,73,31,.13);    /* focus ring */\n  --tint-blue:    rgba(42,90,140,.15);\n  --tint-red:     rgba(163,45,45,.15);\n  --tint-amber:   rgba(154,106,12,.15);\n  --tint-green:   rgba(59,109,17,.16);\n  --tint-muted:   rgba(122,116,104,.16);\n\n  /* ---- Semantic aliases ---- */\n  --bg-app:       var(--paper);\n  --surface-card: var(--card);\n  --border:       var(--line);\n  --text-body:    var(--ink);\n  --text-muted:   var(--muted);\n  --text-on-ink:  var(--paper);\n  --focus-ring:   0 0 0 3px var(--tint-accent);\n  --link:         var(--accent);\n}\n\n@media (prefers-color-scheme: dark) {\n  :root {\n    --ink:    #ede8df;\n    --paper:  #1a1815;\n    --card:   #232019;\n    --line:   #3a352b;\n    --muted:  #9b9486;\n\n    --accent:  #e07a4a;\n    --accent2: #4cae93;\n    --gold:    #d4ab4e;\n\n    --blue:  #6ba3d8;\n    --red:   #e26b6b;\n    --amber: #d4a23e;\n    --green: #8fc04e;\n\n    --wash-neutral: rgba(180,170,150,.10);\n    --wash-neutral-2: rgba(180,170,150,.05);\n    --tint-accent:  rgba(224,122,74,.18);\n  }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   WOA — Typography tokens\n   Two voices: a SERIF for everything editorial (headings, body,\n   project names, report prose) and a SYSTEM SANS for the working\n   layer (labels, tables, metrics, buttons, form controls). The\n   contrast between the two is the signature of the brand.\n   Labels are ALWAYS uppercase, letterspaced, small.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif: \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-sans:  \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono:  \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* Semantic aliases */\n  --font-display: var(--font-serif);  /* page titles, card headings (Geist) */\n  --font-body:    var(--font-serif);  /* report prose, long-form (Geist) */\n  --font-ui:      var(--font-sans);   /* labels, tables, controls, metrics (Geist) */\n\n  /* ---- Type scale (px) ---- */\n  --fs-display: 30px;  /* brand H1 */\n  --fs-h2:      23px;  /* view title */\n  --fs-h3:      16px;  /* card heading */\n  --fs-lead:    15.5px;/* report lead paragraph */\n  --fs-body:    14px;  /* default body */\n  --fs-ui:      13px;  /* control / nav text */\n  --fs-data:    12.8px;/* table cells */\n  --fs-sm:      12px;  /* hints, sub text */\n  --fs-label:   10.5px;/* uppercase field labels */\n  --fs-micro:   10px;  /* table headers */\n\n  /* metric / stat numerals */\n  --fs-metric:  27px;\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;  /* @kind other */\n  --fw-medium:  500;  /* @kind other */\n  --fw-semibold:600;  /* @kind other */\n  --fw-bold:    700;  /* @kind other */\n  --fw-black:   800;  /* @kind other */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1;    /* @kind other */\n  --lh-heading: 1.15; /* @kind other */\n  --lh-body:    1.5;  /* @kind other */\n  --lh-prose:   1.7;  /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight:   -.5px;  /* large serif headings */\n  --ls-h2:      -.3px;\n  --ls-label:   .1em;   /* uppercase field labels */\n  --ls-eyebrow: .22em;  /* brand sub-label, report eyebrow */\n  --ls-caps:    .08em;  /* table headers, small caps */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   WOA — Spacing, radius, shadow, layout tokens\n   Compact, gridded spacing on an even cadence. Soft warm shadows\n   (almost flat) and modest radii — nothing is very round.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --sp-1: 4px;\n  --sp-2: 6px;\n  --sp-3: 8px;\n  --sp-4: 11px;\n  --sp-5: 14px;\n  --sp-6: 18px;\n  --sp-7: 22px;\n  --sp-8: 30px;\n  --sp-9: 40px;\n\n  /* ---- Radius ---- */\n  --radius-sm:   6px;   /* icon buttons, tags, small chips */\n  --radius:      7px;   /* inputs, buttons, segmented controls */\n  --radius-card: 10px;  /* cards, tables, metrics */\n  --radius-pill: 20px;  /* pills, status dots, chips */\n\n  /* ---- Borders ---- */\n  --bw-hair:   1px;     /* default hairline */\n  --bw-rule:   1.5px;   /* table header underline */\n  --bw-strong: 2px;     /* header bottom rule (ink) */\n\n  /* ---- Shadows (warm, near-flat) ---- */\n  --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(40,30,15,.05);\n  --shadow-pop: 0 2px 0 rgba(0,0,0,.05), 0 14px 38px rgba(40,30,15,.10);\n\n  /* ---- Layout ---- */\n  --content-max: 1180px;\n  --content-pad: 22px;\n  --report-max:  840px;\n}\n\n@media (prefers-color-scheme: dark) {\n  :root {\n    --shadow: 0 1px 0 rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.35);\n    --shadow-pop: 0 2px 0 rgba(0,0,0,.3), 0 14px 38px rgba(0,0,0,.5);\n  }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Workers of Art — Design System\n   Global entry point. Consumers link THIS file only.\n   Keep this file as @import lines only — no rules.\n   ============================================================ */\n\n/* ============================================================\n   WOA — Webfonts\n   The typeface is GEIST (Vercel's grotesque sans), with GEIST MONO\n   for the monospace voice — both loaded from Google Fonts. Geist\n   drives both the display/heading layer (--font-serif, name kept for\n   token stability) and the working UI layer (--font-sans); Geist Mono\n   drives --font-mono.\n   ============================================================ */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"c70b574d-7488-4a1c-bc1a-192f1951f096\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"68df6163-c207-4e2a-8b3b-14ee1d8e11a8\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'G de-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"48ee24c7-a738-49b1-a46e-dba0c8c356e8\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* symbols2 */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c5981a77-554e-4ce3-a952-7b894fd96f0a\") format('woff2');\n  unicode-range: U+2000-2001, U+2004-2008, U+200A, U+23B8-23BD, U+2500-259F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"5f45a41f-61ab-4e4f-8af3-e73884ef975c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c5253a08-6848-405f-ba36-5bac06828401\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e14dc28a-e68f-429f-9655-abd0b527323c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   WOA — Color tokens\n   A warm, paper-and-ink editorial palette. Burnt-terracotta is the\n   single brand accent; a deep teal is the secondary. Everything sits\n   on warm cream paper, never pure white, never pure black.\n   Base ramp + semantic aliases. Dark mode mirrors automatically.\n   ============================================================ */\n\n:root {\n  /* ---- Base ramp (warm neutrals) ---- */\n  --ink:    #1a1815;   /* near-black, warm — primary text & filled buttons */\n  --paper:  #f4f1ea;   /* warm cream — app background */\n  --card:   #fffdf8;   /* off-white — raised surfaces */\n  --line:   #ddd6c8;   /* warm border / hairline */\n  --muted:  #7a7468;   /* warm gray — secondary text, labels */\n\n  /* ---- Brand ---- */\n  --accent:  #b5491f;  /* burnt terracotta — PRIMARY brand accent */\n  --accent2: #1d6b58;  /* deep teal-green — secondary accent */\n  --gold:    #a8842c;  /* ochre / brass — tertiary */\n\n  /* ---- Status / data hues (muted, earthy — never neon) ---- */\n  --blue:  #2a5a8c;\n  --red:   #a32d2d;\n  --amber: #9a6a0c;\n  --green: #3b6d11;\n\n  /* ---- Translucent washes (tints over paper) ---- */\n  --wash-neutral: rgba(120,110,90,.08);   /* hover fill on ghost controls */\n  --wash-neutral-2: rgba(120,110,90,.045);/* table row hover */\n  --tint-accent:  rgba(181,73,31,.13);    /* focus ring */\n  --tint-blue:    rgba(42,90,140,.15);\n  --tint-red:     rgba(163,45,45,.15);\n  --tint-amber:   rgba(154,106,12,.15);\n  --tint-green:   rgba(59,109,17,.16);\n  --tint-muted:   rgba(122,116,104,.16);\n\n  /* ---- Semantic aliases ---- */\n  --bg-app:       var(--paper);\n  --surface-card: var(--card);\n  --border:       var(--line);\n  --text-body:    var(--ink);\n  --text-muted:   var(--muted);\n  --text-on-ink:  var(--paper);\n  --focus-ring:   0 0 0 3px var(--tint-accent);\n  --link:         var(--accent);\n}\n\n@media (prefers-color-scheme: dark) {\n  :root {\n    --ink:    #ede8df;\n    --paper:  #1a1815;\n    --card:   #232019;\n    --line:   #3a352b;\n    --muted:  #9b9486;\n\n    --accent:  #e07a4a;\n    --accent2: #4cae93;\n    --gold:    #d4ab4e;\n\n    --blue:  #6ba3d8;\n    --red:   #e26b6b;\n    --amber: #d4a23e;\n    --green: #8fc04e;\n\n    --wash-neutral: rgba(180,170,150,.10);\n    --wash-neutral-2: rgba(180,170,150,.05);\n    --tint-accent:  rgba(224,122,74,.18);\n  }\n}\n\n/* ============================================================\n   WOA — Typography tokens\n   Two voices: a SERIF for everything editorial (headings, body,\n   project names, report prose) and a SYSTEM SANS for the working\n   layer (labels, tables, metrics, buttons, form controls). The\n   contrast between the two is the signature of the brand.\n   Labels are ALWAYS uppercase, letterspaced, small.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif: \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-sans:  \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono:  \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* Semantic aliases */\n  --font-display: var(--font-serif);  /* page titles, card headings (Geist) */\n  --font-body:    var(--font-serif);  /* report prose, long-form (Geist) */\n  --font-ui:      var(--font-sans);   /* labels, tables, controls, metrics (Geist) */\n\n  /* ---- Type scale (px) ---- */\n  --fs-display: 30px;  /* brand H1 */\n  --fs-h2:      23px;  /* view title */\n  --fs-h3:      16px;  /* card heading */\n  --fs-lead:    15.5px;/* report lead paragraph */\n  --fs-body:    14px;  /* default body */\n  --fs-ui:      13px;  /* control / nav text */\n  --fs-data:    12.8px;/* table cells */\n  --fs-sm:      12px;  /* hints, sub text */\n  --fs-label:   10.5px;/* uppercase field labels */\n  --fs-micro:   10px;  /* table headers */\n\n  /* metric / stat numerals */\n  --fs-metric:  27px;\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;  /* @kind other */\n  --fw-medium:  500;  /* @kind other */\n  --fw-semibold:600;  /* @kind other */\n  --fw-bold:    700;  /* @kind other */\n  --fw-black:   800;  /* @kind other */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1;    /* @kind other */\n  --lh-heading: 1.15; /* @kind other */\n  --lh-body:    1.5;  /* @kind other */\n  --lh-prose:   1.7;  /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight:   -.5px;  /* large serif headings */\n  --ls-h2:      -.3px;\n  --ls-label:   .1em;   /* uppercase field labels */\n  --ls-eyebrow: .22em;  /* brand sub-label, report eyebrow */\n  --ls-caps:    .08em;  /* table headers, small caps */\n}\n\n/* ============================================================\n   WOA — Spacing, radius, shadow, layout tokens\n   Compact, gridded spacing on an even cadence. Soft warm shadows\n   (almost flat) and modest radii — nothing is very round.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --sp-1: 4px;\n  --sp-2: 6px;\n  --sp-3: 8px;\n  --sp-4: 11px;\n  --sp-5: 14px;\n  --sp-6: 18px;\n  --sp-7: 22px;\n  --sp-8: 30px;\n  --sp-9: 40px;\n\n  /* ---- Radius ---- */\n  --radius-sm:   6px;   /* icon buttons, tags, small chips */\n  --radius:      7px;   /* inputs, buttons, segmented controls */\n  --radius-card: 10px;  /* cards, tables, metrics */\n  --radius-pill: 20px;  /* pills, status dots, chips */\n\n  /* ---- Borders ---- */\n  --bw-hair:   1px;     /* default hairline */\n  --bw-rule:   1.5px;   /* table header underline */\n  --bw-strong: 2px;     /* header bottom rule (ink) */\n\n  /* ---- Shadows (warm, near-flat) ---- */\n  --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(40,30,15,.05);\n  --shadow-pop: 0 2px 0 rgba(0,0,0,.05), 0 14px 38px rgba(40,30,15,.10);\n\n  /* ---- Layout ---- */\n  --content-max: 1180px;\n  --content-pad: 22px;\n  --report-max:  840px;\n}\n\n@media (prefers-color-scheme: dark) {\n  :root {\n    --shadow: 0 1px 0 rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.35);\n    --shadow-pop: 0 2px 0 rgba(0,0,0,.3), 0 14px 38px rgba(0,0,0,.5);\n  }\n}\n\n<\u002Fstyle>\n  <script src=\"4bda1e3e-18ed-4082-90f7-55ac3481c37d\"><\u002Fscript>\n  <script src=\"389622de-4034-4ae3-a650-47426cb8badd\"><\u002Fscript>\n  <style>\n    /* Monochrome palette — Signal Red single accent */\n    :root {\n      --ink:    #f5f5f5;\n      --paper:  #0a0a0a;\n      --card:   #111111;\n      --line:   #232323;\n      --muted:  #8a8a8a;\n      --accent:  #e02020;\n      --accent2: #c0c0c0;\n      --gold:    #8a8a8a;\n      --blue:    #8a8a8a;\n      --red:     #e02020;\n      --amber:   #8a8a8a;\n      --green:   #5fbf7a;\n      --done:    #5fbf7a;\n      --wash-neutral:   rgba(255,255,255,0.04);\n      --wash-neutral-2: rgba(255,255,255,0.02);\n      --tint-accent:    rgba(224,32,32,0.12);\n      --tint-blue:      rgba(255,255,255,0.05);\n      --tint-red:       rgba(224,32,32,0.12);\n      --tint-amber:     rgba(255,255,255,0.05);\n      --tint-green:     rgba(255,255,255,0.05);\n      --tint-done:      rgba(95,191,122,0.16);\n      --tint-muted:     rgba(255,255,255,0.05);\n      --island-bg:     linear-gradient(160deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 100%);\n      --island-border: rgba(255,255,255,0.10);\n      --island-shadow: inset 0 1px 0 rgba(255,255,255,0.10),0 8px 32px rgba(0,0,0,0.28);\n    }\n    /* Architectural date inputs */\n    [type=\"date\"] {\n      font-family: var(--font-mono) !important;\n      letter-spacing: .08em !important;\n      color: var(--ink) !important;\n    }\n    [type=\"date\"]::-webkit-calendar-picker-indicator {\n      filter: invert(1) opacity(.35);\n      cursor: pointer;\n    }\n    /* Light mode — independently designed, warm gallery paper */\n    body.woa-light {\n      --ink:    #2a251e;\n      --paper:  #f4f1ea;\n      --card:   #faf8f3;\n      --line:   #eae5da;\n      --muted:  #8d8678;\n      --accent:  #b2401d;\n      --accent2: #b8b2a4;\n      --gold:    #8d8678;\n      --blue:    #8d8678;\n      --red:     #c2342a;\n      --amber:   #8d8678;\n      --green:   #2f8f4f;\n      --done:    #2f8f4f;\n      --wash-neutral:   rgba(42,37,30,.035);\n      --wash-neutral-2: rgba(42,37,30,.018);\n      --tint-accent:    rgba(178,64,29,.09);\n      --tint-blue:      rgba(42,37,30,.04);\n      --tint-red:       rgba(194,52,42,.09);\n      --tint-amber:     rgba(42,37,30,.04);\n      --tint-green:     rgba(47,143,79,.10);\n      --tint-done:      rgba(47,143,79,.10);\n      --tint-muted:     rgba(42,37,30,.05);\n      --shadow:     0 0.5px 1px rgba(60,45,20,.03);\n      --shadow-pop: 0 2px 10px rgba(60,45,20,.06);\n      --island-bg:     rgba(250,248,243,0.55);\n      --island-border: rgba(42,37,30,0.06);\n      --island-shadow: 0 1px 3px rgba(60,45,20,.05);\n      /* Re-resolve semantic aliases against the light base tokens */\n      --surface-card: var(--card);\n      --bg-app:       var(--paper);\n      --border:       var(--line);\n      --text-body:    var(--ink);\n      --text-muted:   var(--muted);\n      --text-on-ink:  var(--paper);\n      --focus-ring:   0 0 0 3px var(--tint-accent);\n      --link:         var(--accent);\n    }\n    *, *::before, *::after { box-sizing: border-box; }\n    html, body { margin: 0; padding: 0; }\n    body { background: var(--paper); color: var(--ink); min-height: 100vh; }\n    @media print {\n      body * { visibility: hidden; }\n      #woa-report, #woa-report * { visibility: visible; }\n      #woa-report { position: absolute; left: 0; top: 0; box-shadow: none; border: none; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"WOAApp\" from=\"6d0fff3e-8ab9-42cb-bb15-597d8addbf92#/WOAApp.jsx\" hint-size=\"100%,100vh\"><\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
    /* fix: people/assignee changes now persist to Firebase via polling */
    (function() {
        var PEOPLE_KEY = 'woa:people:v1';
        var FB_KEY = 'woa_people_v1';
        var DB_LS_KEY = 'woa:dburl:demo';
        var _last = null;
        var _timer = null;

        function fbPut(val) {
              var db = localStorage.getItem(DB_LS_KEY);
              if (!db || !val) return;
              window.__woaLastWrite = Date.now();
              fetch(db + FB_KEY + '.json', {
                      method: 'PUT',
                      headers: {'Content-Type': 'application/json'},
                      body: val
              }).catch(function() {});
        }

        function check() {
              var cur = localStorage.getItem(PEOPLE_KEY);
              if (cur && cur !== _last) {
                      _last = cur;
                      clearTimeout(_timer);
                      _timer = setTimeout(function() { fbPut(cur); }, 300);
              }
        }

        function fbGet() {
            var db = localStorage.getItem(DB_LS_KEY);
            if (!db) return;
            fetch(db + FB_KEY + '.json')
                .then(function(r) { return r.ok ? r.text() : null; })
                .then(function(val) {
                    if (val && val !== 'null') {
                        localStorage.setItem(PEOPLE_KEY, val);
                        _last = val;
                    }
                })
                .catch(function() {});
        }

        /* On load: pull latest from Firebase so a new device gets current data */
        fbGet();

                /* Poll every 1 second to detect people changes and sync to Firebase */
        setInterval(check, 1000);
        console.log('[WOA fix] People polling sync active');
    })();
  </script>
